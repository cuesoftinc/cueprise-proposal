<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cueprise | Enterprise Proposals</title>
  <!-- Modern Typography -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Phosphor Icons -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <!-- Background Animated Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <main class="container">
    <header class="header fade-in">
      <div class="logo">
        <i class="ph-duotone ph-buildings"></i>
        <span>Cueprise</span>
      </div>
      <h1 class="title">Enterprise <span>Proposals</span></h1>
      <p class="subtitle">Select a tailored client solution to explore.</p>
    </header>

    <div class="proposals-grid stagger-in">
      <!-- MSN Energy Card -->
      <a href="msn/" class="card">
        <div class="card-glow"></div>
        <div class="card-content">
          <div class="card-icon msn-icon">
            <i class="ph-duotone ph-gas-pump"></i>
          </div>
          <div class="card-text">
            <h2>MSN Energy</h2>
            <p>Downstream Gas Logistics & Asset Management Platform.</p>
          </div>
          <div class="card-arrow">
            <i class="ph-bold ph-arrow-right"></i>
          </div>
        </div>
      </a>

      <!-- STACO Card -->
      <a href="staco/" class="card">
        <div class="card-glow"></div>
        <div class="card-content">
          <div class="card-icon staco-icon">
            <i class="ph-duotone ph-shield-check"></i>
          </div>
          <div class="card-text">
            <h2>STACO Insurance</h2>
            <p>Enterprise Risk, Claims, & Compliance Management.</p>
          </div>
          <div class="card-arrow">
            <i class="ph-bold ph-arrow-right"></i>
          </div>
        </div>
      </a>
    </div>

    <footer class="footer fade-in-delayed">
      <p>&copy; 2026 Cuesoft Inc. All rights reserved.</p>
    </footer>
  </main>
</body>

</html>
